<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * { margin: 0; padding: 0; list-style: none; text-decoration: none; box-sizing: border-box; font-size: 22px; font-weight: bold; color: #000; }
        header { display: flex; justify-content: space-between; align-items: center; width: 100%; height: 100px; background-color: skyblue; }
        .ham { display: none; cursor: pointer; font-size: 30px; }

        @media(max-width:768px) {
            nav { display: none; position: absolute; top: 100px; left: 0; width: 100%; background-color: skyblue; flex-direction: column; align-items: center; }
            nav a { padding: 15px 0; }
            .ham { display: block; }
            #menu:checked + nav { display: flex; }
        }
    </style>
</head>
<body>
    <header>
        <label for="menu" class="ham">≡</label>
        <input type="checkbox" id="menu" hidden>
        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Service</a>
            <a href="#">Contact</a>
        </nav>
    </header>
</body>
</html>
