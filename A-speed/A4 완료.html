<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A4</title>
    <style>
        body { background-color: #f4f4f4; display: flex;  justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .signup-form { background-color: #fff; padding: 30px; border-radius: 8px; width: 300px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .signup-form h2 { text-align: center; margin-bottom: 20px; }
        .signup-form label { display: block; margin-top: 10px; font-size: 14px; }
        .signup-form input { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; }
        .signup-form button { width: 100%; padding: 10px; margin-top: 20px; background-color: #4caf50; color: #fff; border: none; cursor: pointer; font-size: 16px; transition: .3s; }
        .signup-form button:hover { background-color: #45a049; }
    </style>
</head>
<body>
    <form class="signup-form">
        <h2>회원가입</h2>

        <label>이름 *</label>
        <input type="text" required>

        <label>이메일 *</label>
        <input type="email" required>

        <label>비밀번호 *</label>
        <input type="password" required>

        <label>비밀번호 확인 *</label>
        <input type="password" required>

        <button type="submit">회원가입</button>
    </form>
</body>
</html>
