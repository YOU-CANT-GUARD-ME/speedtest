<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A6</title>
    <style>
        *{ padding: 0; margin: 0; box-sizing: border-box; color: #dbdbdb; }
        ul { list-style: none; }
        .container { width: 100%; height: 100vh; display: flex; justify-content: center; align-items: end; }
        .footer { width: 100%; height: 400px; background-color: rgb(48, 53, 80); }
        .top { width: 100%; height: 320px; display: flex; justify-content: space-between; align-items: start; border-bottom: 1px solid #c7c7c7a6; padding: 0px 20px; }
        .top-l { height: 250px; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        .top-l h1 { color: rgb(57, 143, 255); margin-bottom: 20px; }
        .top-r { display: flex; flex-direction: row; justify-content: space-between; align-items: center; width: 300px; height: 250px; margin-right: 80px; }
        .top-r ul { display: flex; flex-direction: column; height: 150px; justify-content: space-between; }
        .top-r ul > h3 { color: #fff; } 
        .bottom { height: 80px; padding: 0 20px; display: flex; flex-direction: row; justify-content: space-between; align-items: center; }
        .bottom-r p { color: rgb(204, 204, 204); }
    </style>
</head>
<body>
    <div class="container">
        <div class="footer">
            <div class="top">
                <div class="top-l">
                    <h1>WorldSkills Korea</h1>
                    <p>
                        세계기능올림픽대회를 통해 기능인재 양성과 <br>
                        기능의 우수성을 널리 알리고 있습니다.
                    </p>
                </div>
                <div class="top-r">
                    <ul>
                        <h3>바로가기</h3>
                        <li>기능경기대회</li>
                        <li>교육과정</li>
                        <li>자료실</li>
                        <li>공지사항</li>
                    </ul>
                    <ul>
                        <h3>고객지원</h3>
                        <li>FAQ</li>
                        <li>1:1 문의</li>
                        <li>이용약관</li>
                        <li>개인정보처리방침</li>
                    </ul>
                </div>
            </div>
            <div class="bottom">
                <div class="bottom-l">
                    <p>
                        주소: 서울특별시 강남구 테헤란로 123 WorldSkills 빌딩 <br>
                        전화: 02-1234-5678 | 이메일: info@worldskills.kr
                    </p>
                </div>
                <div class="bottom-r">
                    <p>© 2026 WorldSkills Korea. All rights reserved.</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
