<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="../lib/lib.css">
    <title>A14 - 툴팁</title>
</head>
<style>
    body { display: flex; justify-content: center; align-items: center; height: 100vh;  }
    .ul { display: flex; justify-content: space-between; width: 200px; height: 30px; }

    .tip1 { position: relative; cursor: pointer; }
    .tip1::after { content: attr(data-tip); width: max-content; height: 20px; position: absolute; transform: translate(-50%, 160%); font-size: 12px; opacity: 0; }
    .tip1:hover::after { opacity: 1; }
    .tip1:focus::after { opacity: 1; }

    .tip2 { position: relative; cursor: pointer; }
    .tip2::after { content: attr(data-tip); width: max-content; height: 20px; position: absolute; transform: translate(7%, 30%); font-size: 12px; opacity: 0; }
    .tip2:hover::after { opacity: 1; }
    .tip2:focus::after { opacity: 1; }
</style>
<body>
    <div class="ul">
        <button class="tip1" data-tip="“설정” 버튼을 눌러 서비스를 설정할 수 있습니다.">설정</button>
        <button class="tip2" data-tip="로그아웃되고 메인페이지로 이동합니다.">로그아웃</button>
    </div>
</body>
</html>
