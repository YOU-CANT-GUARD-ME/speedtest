<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A8</title>
    <style>
        * { margin: 0; padding: 0; }
        .container { width: 100%; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .box { width: 700px; height: 700px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.2); overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        .header { width: 100%; height: 80px; text-align: center; line-height: 80px; background-color: #333; color: #fff; font-size: 23px; font-weight: bold; }
        .item { width: 100%; height: 125px;  display: flex; flex-direction: row; justify-content: space-between; align-items: center; box-shadow: 0 0 1px rgba(0, 0, 0, 0.253); }
        .left { display: flex; flex-direction: row; margin-left: 15px; }
        .left img { width: 75px; height: 90px; border-radius: 10px; margin-right: 10px; }
        .text { display: flex; flex-direction: column; height: 90px; justify-content: space-between; }
        .text h2 { font-size: 19px; }
        .text p { color: #777; font-size: 16px; }
        .right { display: flex; flex-direction: row; justify-content: space-between; align-items: center; width: 200px; margin-right: 15px; }
        .right button { width: 20px; height: 20px; background-color: #fff; border: 1px solid #aaaaaa80; border-radius: 3px; cursor: pointer; }
        .count { font-weight: bold; }
        .amount { font-weight: bold; }
        .x-btn { width: 27px; height: 27px; text-align: center; line-height: 25px; background-color: red; border-radius: 50%; color: white; cursor: pointer; }
        .calc {width: 95%; height: 50px; display: flex; flex-direction: row; justify-content: space-between; padding: 15px 0; box-shadow: 0 1px 0 rgba(170, 170, 170, 0.24); }
        .type { height: 50px; display: flex; flex-direction: column; justify-content: space-between; }
        .price { height: 50px; display: flex; flex-direction: column; align-items: end; }
        .bottom { width: 95%; height: 150px; display: flex; flex-direction: column; justify-content: space-between; align-items: center; margin: 15px; }
        .totalprice { width: 100%; display: flex; justify-content: space-between; font-size: 18px; font-weight: bold; }
        .buttons { display: flex; flex-direction: row; width: 300px; justify-content: center; }
        .con { margin-right: 10px; background-color: #777; color: #fff; width: 130px; height: 50px; text-align: center; line-height: 50px; border-radius: 4px; cursor: pointer; }
        .order { background-color: #21c500; color: #fff; width: 100px; height: 50px; text-align: center; line-height: 50px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            <div class="header">장바구니</div>
            <div class="item">
                <div class="left">
                    <img src="../선수제공파일/A8/images/tshirt.jpg" alt="" class="img">
                    <div class="text">
                        <h2>WorldSkills 공식 티셔츠</h2>
                        <p>색상: 네이비</p>
                        <p>사이즈: L</p>
                    </div>                    
                </div>
                <div class="right">
                    <button>-</button>
                    <div class="count">2</div>
                    <button>+</button>
                    <div class="amount">25,000원</div>
                    <div class="x-btn">x</div>
                </div>
            </div>
            <div class="item">
                <div class="left">
                    <img src="../선수제공파일/A8/images/book.jpg" alt="" class="img">
                    <div class="text">
                        <h2>기능경기 가이드북</h2>
                        <p>종류: 웹디자인</p>
                        <p>2026년 최신판</p>
                    </div>                    
                </div>
                <div class="right">
                    <button>-</button>
                    <div class="count">1</div>
                    <button>+</button>
                    <div class="amount">15,000원</div>
                    <div class="x-btn">x</div>
                </div>
            </div>
            <div class="item">
                <div class="left">
                    <img src="../선수제공파일/A8/images/laptop-case.jpg" alt="" class="img">
                    <div class="text">
                        <h2>WorldSkills 노트북 파우치</h2>
                        <p>색상: 블랙</p>
                        <p>15인치 호환</p>
                    </div>                    
                </div>
                <div class="right">
                    <button>-</button>
                    <div class="count">1</div>
                    <button>+</button>
                    <div class="amount">35,000원</div>
                    <div class="x-btn">x</div>
                </div>
            </div>
            <div class="calc">
                <div class="type">
                    <div>상품금액</div>
                    <div>배송비</div>
                </div>
                <div class="price">
                    <div>75,000원</div>
                    <div>3,000원</div>
                </div>
            </div>
            <div class="bottom">
                <div class="totalprice">
                    <div>총 결제금액</div>
                    <div>78,000원</div>
                </div>
                <div class="buttons">
                    <div class="con">쇼핑 계속하기</div>
                    <div class="order">주문하기</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
