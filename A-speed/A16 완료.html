<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; list-style: none; }
        body { display: flex; align-items: center; justify-content: center; height: 100vh; }
        .container { display: flex; flex-direction: column; justify-content: space-between; height: 150px; }

        .stepTxt { color: #b8b8b8; font-size: 14px; font-weight: normal; }
        .mainTxt { font-weight: bold; font-size: 25px; }
        .stateTxt { font-size: 14px; font-weight: bold; }
        .st1 { color: lightgreen; }
        .st2 { color: skyblue; }
        .st3 { color: #b8b8b8; }

        .check { position: absolute; width: 18px; height: 10px; border-left: 3px solid #fff; border-bottom: 3px solid #fff; transform: rotate(-45deg) translate(0px, 23px); }
        .round { width: 50px; height: 50px; border-radius: 50%; }
        .r1 { position: relative; background-color: rgb(12, 155, 12); }
        .r2 { position: relative; display: block; width: 50px; height: 50px; border: 2px solid rgb(22, 130, 231); border-radius: 50%; }
        .r3 { background-color: skyblue; }
        .roundInRound { position: absolute; top: 5.5px; left: 5.4px; width: 35px; height: 35px; background-color: rgb(22, 130, 231); border-radius: 50%; }

        .bar { width: 100px; height: 5px; border-radius: 20px; }
        .b1 { background-color: rgb(12, 155, 12); }
        .b2 { position: relative; width: 100px; height: 5px; border-radius: 20px; background-color: rgb(129, 175, 219); }
        .barInBar { position: absolute; width: 50px; height: 5px; border-radius: 20px; background-color: rgb(22, 130, 231); }

        .gageBar { display: flex; justify-content: space-between; align-items: center; width: 450px; height: 50px; }
        .content { display: flex; justify-content: space-between; align-items: center; width: 450px; height: 50px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="gageBar">
            <span class="round r1">
                <span class="check"></span>
            </span>
            <span class="bar b1"></span>

            <span class="round r2">
                <span class="roundInRound"></span>
            </span>

            <span class="bar b2">
                <span class="barInBar"></span>
            </span>
            <span class="round r3"></span>
        </div>
        <div class="content">
            <ul>
                <li class="stepTxt">STEP 1</li>
                <li class="mainTxt">Card Details</li>
                <li class="stateTxt st1">Completed</li>
            </ul>
            <ul>
                <li class="stepTxt">STEP 2</li>
                <li class="mainTxt">Form Review</li>
                <li class="stateTxt st2">In Progress</li>
            </ul>
            <ul>
                <li class="stepTxt">STEP 3</li>
                <li class="mainTxt">Authentication</li>
                <li class="stateTxt st3">pending</li>
            </ul>
        </div>
    </div>
</body>
</html>
