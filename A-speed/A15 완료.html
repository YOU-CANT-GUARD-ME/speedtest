<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; list-style: none; }
        .container { width: 70%; margin: 0 auto; }
        ul { display: grid; grid-template-columns: repeat(4, 1fr); }
        li { text-align: center; }
        @media (min-width: 768px) and (max-width: 1023px) { ul { display: grid; grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 767px) { ul { display: grid; grid-template-columns: repeat(1, 1fr); } }
    </style>
</head>
