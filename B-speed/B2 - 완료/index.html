<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .container { width: 100%; height: 100vh; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        .flex { display: flex; }
        .box { width: 300px; flex-direction: column; gap: 20px; }
        h2 { text-align: center; }
        .addBtn { width: 100%; gap: 30px;  }
        input { flex: 4; }
        button { flex: 1; }
        p { flex: 6; }
        ul { gap: 10px; flex-direction: column; }
        li { display: flex; width: 100%; background-color: #eee; padding: 10px 5px; }
        .des { background-color: red; cursor: pointer; color: #fff; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="box flex">
            <h2>To-Do 리스트</h2>
            <div class="addBtn flex">
                <input type="text" placeholder="할 일을 입력하세요">
                <button>추가</button>
            </div>
            <ul class="list flex"></ul>            
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
