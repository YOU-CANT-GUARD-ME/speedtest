<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { width: 100%; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .signup { display: flex; flex-direction: column; justify-content: space-between; width: 300px; height: 420px; border-radius: 10px; padding: 10px; border: #ccc solid 1px;  }
        .signup h2 { margin-bottom: 20px; text-align: center; }
        .signup label { display: block; margin-top: 10px; font-size: 18px; }
        .signup input { width: 100%; padding: 5px; }
        .signup button { border: none; padding: 5px; margin-top: 20px; border-radius: 5px; cursor: pointer;  }
        .signup button:active {background-color: #e0e0e0; }
    </style>
</head>
<body>
    <form class="signup">
        <h2>회원가입</h2>

        <label>이름 *</label>
        <input type="text" required>
        
        <label>이메일 *</label>
        <input type="text" required>

        <label>비밀번호 *</label>
        <input type="text" required>

        <label>비밀번호 확인 *</label>
        <input type="text" required>

        <button type="submit">회원가입</button>
    </form>
</body>
</html>
