<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * { padding: 0; margin: 0; list-style: none; box-sizing: border-box; }
        body { display: flex; justify-content: center; align-items: center; width: 100%; height: 100vh; background-color: #252F39; animation: rotate 2s infinite ease-in-out; }
        ul { display: flex; flex-wrap: wrap; gap: 35px; width: 140px; height: 140px; }
        li { width: 50px; height: 50px; border-radius: 50%; animation: bounce .7s infinite ease-in-out;}

        li:nth-child(1) { background-color: #FFD1DC; --x: 15px; --y: 15px;}
        li:nth-child(2) { background-color: #C3E0E5; --x: -15px; --y: 15px;}
        li:nth-child(3) { background-color: #E6DAF7; --x: 15px; --y: -15px;}
        li:nth-child(4) { background-color: #FFDAB9; --x: -15px; --y: -15px;}

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(90deg); }
            50% { transform: rotate(180deg); }
            75% { transform: rotate(270deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes bounce {
            0% { transform: translate(0,0); }
            50% { transform: translate(var(--x),var(--y)); }
            100% { transform: translate(0,0); }
        }
    </style>
</head>
<body>
    <ul>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
    </ul>
</body>
</html>
