<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { width: 100%; height: 100vh; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        .container { width: 650px; height: 400px; display: flex; flex-direction: column; justify-content: space-between; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.2); }
        h1 { text-align: center; margin-bottom: 20px; }
        .box { width: 100%; height: 80px; display: flex; flex-direction: row; justify-content: space-between; align-items: center; padding: 10px 20px; border-bottom: 1px solid #ccc; }
        .con { display: flex; flex-direction: row; }
        .eve { margin-right: 10px; width: 50px; height: 30px; line-height: 30px; border-radius: 10px; background-color: rgb(3, 3, 240); color: #fff;  text-align: center; font-weight: bold; }
        .title { font-size: 19px; font-weight: bold; }
        .red { background-color: red; }
        .last { border: none; }
    </style>
</head>
<body> 
    <h1>고지사항</h1>
    <div class="container">

        <div class="box">
            <div class="con">
                <div class="eve red">중요</div>
                <div class="title">2026년 WorldSkills 대회 일정 안내</div>
            </div>
            <div class="date">2026-01-15</div>
        </div>
        
        <div class="box">
            <div class="con">
                <div class="eve">공지</div>
                <div class="title">웹디자인 기술대회 참가신청 마감</div>
            </div>
            <div class="date">2026-01-10</div>
        </div>

        <div class="box">
            <div class="con">
                <div class="eve">안내</div>
                <div class="title">온라인 교육과정 개설 안내</div>
            </div>
            <div class="date">2026-01-08</div>
        </div>

        <div class="box">
            <div class="con">
                <div class="eve">공지</div>
                <div class="title">2026년 1분기 교육일정 발표</div>
            </div>
            <div class="date">2026-01-05</div>
        </div>

        <div class="box last">
            <div class="con">
                <div class="eve">안내</div>
                <div class="title">홈페이지 점검 일정 안내</div>
            </div>
            <div class="date">2026-01-03</div>
        </div>
    </div>
</body>
</html>
