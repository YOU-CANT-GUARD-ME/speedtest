<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * { margin: 0; padding: 0; }
        body { width: 100%; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .toggle-label { padding: 10px; background-color: rgb(27, 27, 216); color: #fff; border-radius: 5px; cursor: pointer; }
        body:has(#toggle:checked) { background-color: #222;}
    </style>
</head>
<body>
    <input type="checkbox" id="toggle" hidden>

    <div class="wrapper">
        <label for="toggle" class="toggle-label">Toggle Theme</label>
    </div>
</body>
</html>
